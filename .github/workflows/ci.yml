name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: pcov
          tools: composer:v2
          extensions: igbinary, openssl, zlib

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Line coverage gate
        run: composer test:coverage

      - name: Static analysis, style, and unit tests
        run: composer check

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: pcov
          tools: composer:v2
          extensions: igbinary, openssl, zlib, pcov

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Infection mutation testing
        run: composer test:mutation

  memcached-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: igbinary

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install memcached server
        run: sudo apt-get update && sudo apt-get install -y memcached

      - name: PHPUnit (memcached integration)
        run: composer test:integration

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: igbinary

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install memcached server
        run: sudo apt-get update && sudo apt-get install -y memcached redis-server openssl unzip curl

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cross-backend contract tests
        run: composer test:contract

  memcached-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: memcached, igbinary

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install memcached server
        run: sudo apt-get update && sudo apt-get install -y memcached

      - name: PHPUnit (PECL parity)
        run: composer test:parity

  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: igbinary

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install redis-server and OpenSSL
        run: sudo apt-get update && sudo apt-get install -y redis-server openssl

      - name: Generate Redis TLS fixtures
        run: bash scripts/gen-redis-tls-fixtures.sh

      - name: Start secondary Redis and TLS Redis
        run: |
          set -euo pipefail
          SECONDARY_PORT=$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1",0)); print(s.getsockname()[1]); s.close()')
          redis-server --port "${SECONDARY_PORT}" --save "" --appendonly no --daemonize yes
          echo "REDIS_TEST_PORT_2=${SECONDARY_PORT}" >> "${GITHUB_ENV}"
          redis-server \
            --port 0 \
            --tls-port 6380 \
            --tls-cert-file tests/fixtures/redis-tls/server.crt \
            --tls-key-file tests/fixtures/redis-tls/server.key \
            --tls-ca-cert-file tests/fixtures/redis-tls/ca.crt \
            --tls-auth-clients no \
            --save "" \
            --appendonly no \
            --daemonize yes
          echo "REDIS_TLS_TEST_PORT=6380" >> "${GITHUB_ENV}"
          echo "REDIS_TLS_CA_FILE=${GITHUB_WORKSPACE}/tests/fixtures/redis-tls/ca.crt" >> "${GITHUB_ENV}"

      - name: PHPUnit (redis integration)
        env:
          REDIS_TEST_HOST: 127.0.0.1
          REDIS_TEST_PORT: "6379"
        run: composer test:redis

  ignite-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: igbinary

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install unzip and curl
        run: sudo apt-get update && sudo apt-get install -y unzip curl

      - name: PHPUnit (Ignite integration)
        run: composer test:ignite

  check-optional-ext:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
          extensions: igbinary, msgpack, zstd, fastlz, openssl, zlib

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Unit tests with optional extensions enabled
        run: composer test

  check-php84:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2
          extensions: igbinary

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Static analysis and unit tests (PHP 8.4)
        run: composer check

  all-green:
    runs-on: ubuntu-latest
    needs:
      - check
      - mutation
      - memcached-integration
      - contract
      - memcached-parity
      - redis-integration
      - ignite-integration
      - check-php84
      - check-optional-ext
    if: always()
    steps:
      - name: Require every CI job to succeed
        run: |
          test "${{ needs.check.result }}" = "success"
          test "${{ needs.mutation.result }}" = "success"
          test "${{ needs.memcached-integration.result }}" = "success"
          test "${{ needs.contract.result }}" = "success"
          test "${{ needs.memcached-parity.result }}" = "success"
          test "${{ needs.redis-integration.result }}" = "success"
          test "${{ needs.ignite-integration.result }}" = "success"
          test "${{ needs.check-php84.result }}" = "success"
          test "${{ needs.check-optional-ext.result }}" = "success"
