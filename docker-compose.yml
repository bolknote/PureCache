services:
  memcached:
    image: memcached:1.6-alpine
    ports:
      - "11211:11211"
    command: ["-m", "64"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  ignite:
    image: apacheignite/ignite:2.16.0
    ports:
      - "10800:10800"
    environment:
      JVM_OPTS: "-Xms256m -Xmx512m"
